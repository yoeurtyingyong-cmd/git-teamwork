<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Dashboard</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        display: flex;
        height: 100vh;
        background: #f4f6f9;
    }

    /* Sidebar */
    .sidebar {
        width: 220px;
        background: #1f2937;
        color: white;
        padding: 20px;
    }

    .sidebar h2 {
        margin-bottom: 20px;
    }

    .sidebar a {
        display: block;
        color: #ccc;
        text-decoration: none;
        margin: 10px 0;
        padding: 8px;
        border-radius: 6px;
    }

    .sidebar a:hover {
        background: #374151;
        color: white;
    }

    /* Main */
    .main {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    /* Topbar */
    .topbar {
        background: white;
        padding: 15px 20px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    /* Content */
    .content {
        padding: 20px;
    }

    .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
    }

    .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card h3 {
        margin-bottom: 10px;
        color: #111827;
    }

    .card p {
        color: #6b7280;
    }
</style>

</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Dashboard</h2>
        <a href="#">Home</a>
        <a href="#">Users</a>
        <a href="#">Analytics</a>
        <a href="#">Settings</a>
    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="topbar">
            <h3>Welcome Back 👋</h3>
        </div>

        <div class="content">
            <div class="cards">

                <div class="card">
                    <h3>Users</h3>
                    <p>1,240 total users</p>
                </div>

                <div class="card">
                    <h3>Revenue</h3>
                    <p>$12,400 this month</p>
                </div>

                <div class="card">
                    <h3>Orders</h3>
                    <p>320 new orders</p>
                </div>

                <div class="card">
                    <h3>Visits</h3>
                    <p>8,900 website visits</p>
                </div>

            </div>
        </div>

    </div>

</body>
</html>
