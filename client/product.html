<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .container {
            width: 90%;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }

        .card h3 {
            margin: 10px 0;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        .btn {
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

<header>
    <h1>Product List</h1>
</header>

<div class="container">

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Product 1</h3>
        <p class="price">$10</p>
        <button class="btn">Buy</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Product 2</h3>
        <p class="price">$20</p>
        <button class="btn">Buy</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Product 3</h3>
        <p class="price">$15</p>
        <button class="btn">Buy</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200" alt="Product">
        <h3>Product 4</h3>
        <p class="price">$25</p>
        <button class="btn">Buy</button>
    </div>

</div>

</body>
</html>
